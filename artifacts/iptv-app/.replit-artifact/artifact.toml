kind = "mobile"
previewPath = "/"
title = "IPTV App"
version = "1.0.0"
id = "artifacts/iptv-app"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/" ]
localPort = 20864

[services.development]
run = "pnpm --filter @workspace/iptv-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/iptv-app", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/iptv-app", "run", "serve" ]

[services.env]
PORT = "20864"
BASE_PATH = "/"
